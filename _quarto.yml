              - quarto-workflows/thermodynamics/boltzman.md
      - acknowledgments.qmd
       
       
format:
  html:
    theme: 
       dark: darkly
       light: flatly
    code-copy: true
    code-overflow: wrap
    toc: true
    fig-align: center


filters:
  - include-files.lua
  - quarto

  
